name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          PKG_VER=$(node -p "require('./package.json').version")
          CARGO_VER=$(grep -E '^version = ' src-tauri/Cargo.toml | head -1 | sed -E 's/version = "([^"]+)"/\1/')
          TAURI_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [[ "$PKG_VER" != "$VERSION" || "$CARGO_VER" != "$VERSION" || "$TAURI_VER" != "$VERSION" ]]; then
            echo "::error::version mismatch: tag=$VERSION package.json=$PKG_VER Cargo.toml=$CARGO_VER tauri.conf.json=$TAURI_VER"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Generate latest.json
        id: latest
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/release/bundle"
          NSIS_DIR="$BUNDLE_DIR/nsis"
          mapfile -t INSTALLERS < <(find "$NSIS_DIR" -maxdepth 1 -type f -name '*.exe' | sort)
          if [[ "${#INSTALLERS[@]}" -ne 1 ]]; then
            echo "::error::expected exactly one NSIS .exe in $NSIS_DIR, found ${#INSTALLERS[@]}"
            printf '%s\n' "${INSTALLERS[@]}"
            exit 1
          fi
          INSTALLER="${INSTALLERS[0]}"
          SIG_FILE="${INSTALLER}.sig"
          if [[ ! -f "$SIG_FILE" ]]; then
            echo "::error::expected updater signature missing: $SIG_FILE"
            exit 1
          fi

          INSTALLER_NAME="$(basename "$INSTALLER")"
          SIG_NAME="$(basename "$SIG_FILE")"
          SIGNATURE="$(cat "$SIG_FILE")"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DOWNLOAD_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          LATEST_JSON="$BUNDLE_DIR/latest.json"

          node - "$VERSION" "$PUB_DATE" "$SIGNATURE" "$DOWNLOAD_BASE/$INSTALLER_NAME" "$LATEST_JSON" <<'NODE'
          const fs = require('fs')
          const [version, pubDate, signature, url, out] = process.argv.slice(2)
          fs.writeFileSync(out, JSON.stringify({
            version,
            notes: `Tokcat ${version} Windows release.`,
            pub_date: pubDate,
            platforms: {
              'windows-x86_64': { signature, url },
            },
          }, null, 2))
          NODE

          echo "installer=$INSTALLER" >> "$GITHUB_OUTPUT"
          echo "installer_name=$INSTALLER_NAME" >> "$GITHUB_OUTPUT"
          echo "sig_file=$SIG_FILE" >> "$GITHUB_OUTPUT"
          echo "sig_name=$SIG_NAME" >> "$GITHUB_OUTPUT"
          echo "latest_json=$LATEST_JSON" >> "$GITHUB_OUTPUT"
          cat "$LATEST_JSON"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ github.ref_name }}
          INSTALLER: ${{ steps.latest.outputs.installer }}
          SIG_FILE: ${{ steps.latest.outputs.sig_file }}
          LATEST_JSON: ${{ steps.latest.outputs.latest_json }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            "$INSTALLER" \
            "$SIG_FILE" \
            "$LATEST_JSON" \
            --title "Tokcat Windows $VERSION" \
            --notes "Tokcat $VERSION Windows x64 installer."
